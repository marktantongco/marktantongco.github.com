<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  @page { size: 720pt 405pt; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
</style>
</head>
<body style="width:720pt; height:405pt; margin:0; padding:0; overflow:hidden; display:flex; flex-direction:column; background-image:url('dark-gradient.png'); background-size:cover; background-position:center; font-family:'Corbel',sans-serif;">

  <!-- Semi-transparent overlay -->
  <div style="position:absolute; top:0; left:0; width:720pt; height:405pt; background-color:rgba(30,18,10,0.45);"></div>

  <!-- Content -->
  <div style="position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; justify-content:center; width:720pt; height:405pt; padding:40pt 60pt;">

    <!-- Gold divider top -->
    <div style="width:60pt; height:2pt; background-color:#C09E30; margin-bottom:20pt;"></div>

    <!-- Main closing line -->
    <h1 style="font-family:'Palatino Linotype','Corbel',serif; font-size:36pt; color:#FFFFFF; text-align:center; margin-bottom:8pt; letter-spacing:2pt;">GO BUILD A BETTER US.</h1>

    <!-- Gold divider bottom -->
    <div style="width:60pt; height:2pt; background-color:#C09E30; margin-bottom:24pt;"></div>

    <!-- Author name -->
    <p style="font-family:'Palatino Linotype','Corbel',serif; font-size:16pt; color:#CEBFB5; text-align:center; margin-bottom:6pt;">Mark Anthony Ng Tantongco</p>

    <!-- Email -->
    <p style="font-size:13pt; color:#9E8A7A; text-align:center; margin-bottom:20pt; white-space:nowrap;">mark.tantongco@gmail.com</p>

    <!-- Motto -->
    <div style="padding:6pt 24pt; border:1.5pt solid #C09E30; border-radius:3pt; margin-bottom:18pt;">
      <p style="font-size:14pt; color:#C09E30; text-align:center; letter-spacing:2pt; white-space:nowrap;">FAITH + FRAMEWORK = FREEDOM</p>
    </div>

    <!-- Scripture -->
    <p style="font-family:'Palatino Linotype','Corbel',serif; font-size:11pt; color:#6B5443; text-align:center; font-style:italic;">"I can do all things through Christ who strengthens me — Phil 4:13"</p>

  </div>

</body>
</html>
